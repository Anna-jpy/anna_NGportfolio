<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Architecture - Portfolio SISR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --accent: #00d4ff;
            --accent-dark: #0099cc;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --glass: rgba(0, 212, 255, 0.1);
            --glow: rgba(0, 212, 255, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, var(--glass) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, var(--glass) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.05); }
        }


        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .hero-content {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        .hero-badge {
            display: inline-block;
            background: var(--glass);
            border: 1px solid var(--accent);
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            animation: badgeGlow 3s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 10px var(--accent); }
            50% { box-shadow: 0 0 20px var(--accent); }
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShine 4s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 60px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Architecture Circles Grid */
        .architecture-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 60px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .arch-circle {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
            backdrop-filter: blur(15px);
            margin: 0 auto;
        }

        .arch-circle::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, var(--accent), transparent);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .arch-circle:hover::before {
            opacity: 1;
        }

        .arch-circle:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 25px 50px var(--glow);
        }

        .arch-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s ease;
            background: linear-gradient(45deg, var(--accent), var(--accent-dark));
            box-shadow: 0 10px 20px var(--glow);
        }

        .arch-icon i {
            font-size: 2rem;
            color: white;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .arch-circle:hover .arch-icon {
            transform: rotate(360deg) scale(1.1);
        }

        .arch-circle:hover .arch-icon i {
            transform: rotate(-360deg);
        }

        /* Individual Circle Styles */
        .identity-circle {
            border-color: var(--accent);
        }

        .identity-circle:hover {
            border-color: var(--accent);
            box-shadow: 0 25px 50px var(--glow);
        }

        .core-circle {
            border-color: var(--accent);
        }

        .core-circle:hover {
            border-color: var(--accent);
            box-shadow: 0 25px 50px var(--glow);
        }

        .vision-circle {
            border-color: var(--accent);
        }

        .vision-circle:hover {
            border-color: var(--accent);
            box-shadow: 0 25px 50px var(--glow);
        }

        .arch-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text);
            transition: all 0.4s ease;
        }

        .arch-circle:hover .arch-title {
            color: var(--accent);
        }

        .arch-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            transition: all 0.4s ease;
            padding: 0 20px;
        }

        .arch-circle:hover .arch-description {
            color: var(--text);
        }

        /* Floating Elements */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-element {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .floating-element:nth-child(1) {
            top: 15%;
            left: 5%;
            animation-delay: 0s;
        }

        .floating-element:nth-child(2) {
            top: 35%;
            left: 20%;
            animation-delay: 1s;
        }

        .floating-element:nth-child(3) {
            top: 55%;
            left: 8%;
            animation-delay: 2s;
        }

        .floating-element:nth-child(4) {
            top: 75%;
            left: 25%;
            animation-delay: 0.5s;
        }

        .floating-element:nth-child(5) {
            top: 25%;
            right: 15%;
            animation-delay: 1.5s;
        }

        .floating-element:nth-child(6) {
            top: 65%;
            right: 5%;
            animation-delay: 2.5s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0px) scale(1);
                opacity: 0.7;
            }
            50% { 
                transform: translateY(-20px) scale(1.2);
                opacity: 1;
            }
        }


        /* Responsive */
        @media (max-width: 1024px) {
            .architecture-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .arch-circle {
                width: 250px;
                height: 250px;
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 20px;
            }

            .content {
                padding: 60px 20px;
            }

            .arch-circle {
                width: 220px;
                height: 220px;
            }

            .arch-icon {
                width: 60px;
                height: 60px;
                margin-bottom: 20px;
            }

            .arch-icon i {
                font-size: 1.5rem;
            }

            .arch-title {
                font-size: 1.2rem;
            }

            .arch-description {
                font-size: 0.85rem;
                padding: 0 15px;
            }

        }

        @media (max-width: 480px) {
            .arch-circle {
                width: 200px;
                height: 200px;
            }

            .arch-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 15px;
            }

            .arch-icon i {
                font-size: 1.2rem;
            }

            .arch-title {
                font-size: 1.1rem;
                margin-bottom: 10px;
            }

            .arch-description {
                font-size: 0.8rem;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>


    <!-- Main Container -->
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="floating-elements">
                <div class="floating-element"></div>
                <div class="floating-element"></div>
                <div class="floating-element"></div>
                <div class="floating-element"></div>
                <div class="floating-element"></div>
                <div class="floating-element"></div>
            </div>

            <div class="hero-content">
                <div class="hero-badge">
                    <i class="fas fa-sitemap"></i>
                    Architecture
                </div>
                <p class="hero-subtitle">Naviguer dans mon univers technique</p>
                
                <div class="architecture-grid">
                    <div class="arch-circle identity-circle" onclick="window.location.href='Digital Identity'">
                        <div class="arch-icon">
                            <i class="fas fa-user-astronaut"></i>
                        </div>
                        <h3 class="arch-title">Digital Identity</h3>
                    </div>
                    
                    <div class="arch-circle core-circle" onclick="window.location.href='system-core.html'">
                        <div class="arch-icon">
                            <i class="fas fa-microchip"></i>
                        </div>
                        <h3 class="arch-title">System Core</h3>
                    </div>
                    
                    <div class="arch-circle vision-circle" onclick="window.location.href='network-vision.html'">
                        <div class="arch-icon">
                            <i class="fas fa-satellite-dish"></i>
                        </div>
                        <h3 class="arch-title">Network Vision</h3>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>

        // Circle hover effects
        document.querySelectorAll('.arch-circle').forEach(circle => {
            circle.addEventListener('mouseenter', () => {
                circle.style.transform = 'translateY(-15px) scale(1.05)';
            });
            
            circle.addEventListener('mouseleave', () => {
                circle.style.transform = 'translateY(0) scale(1)';
            });
        });


        // Parallax effect for floating elements
        window.addEventListener('scroll', function() {
            const scrolled = window.pageYOffset;
            const parallax = document.querySelectorAll('.floating-element');
            const speed = 0.3;

            parallax.forEach(function(element) {
                const yPos = -(scrolled * speed);
                element.style.transform = `translateY(${yPos}px)`;
            });
        });

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            // Page ready
        });
    </script>
</body>
</html>
