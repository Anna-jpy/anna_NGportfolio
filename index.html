<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio SISR - Future Administratrice Systèmes & Réseaux</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --accent: #00ff88;
            --accent-dark: #00cc66;
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --glass: rgba(0, 255, 136, 0.1);
            --glow: rgba(0, 255, 136, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        /* Subtle Particle Effect */
        .subtle-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.2;
        }

        .subtle-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            animation: subtle-float 20s linear infinite;
        }

        @keyframes subtle-float {
            0% { 
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% { 
                opacity: 0.3;
            }
            90% { 
                opacity: 0.3;
            }
            100% { 
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
            }
        }



        /* Mysterious Structure */
        .main-content {
            min-height: 100vh;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero Section Mysterious */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 20px;
        }


        .hero-content {
            text-align: center;
            max-width: 800px;
            padding: 0 40px;
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(50px);
            animation: mysteriousReveal 2s ease 1s forwards;
        }

        /* Hidden Navigation Clues */
        .mystery-clues {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .mystery-clue {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: mysteryPulse 4s ease-in-out infinite;
        }

        .mystery-clue:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .mystery-clue:nth-child(2) { top: 30%; right: 15%; animation-delay: 1s; }
        .mystery-clue:nth-child(3) { bottom: 25%; left: 20%; animation-delay: 2s; }
        .mystery-clue:nth-child(4) { bottom: 35%; right: 10%; animation-delay: 3s; }
        .mystery-clue:nth-child(5) { top: 50%; left: 5%; animation-delay: 4s; }
        .mystery-clue:nth-child(6) { top: 60%; right: 5%; animation-delay: 5s; }

        /* Secret Interaction Zones */
        .secret-zone {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--accent);
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            animation: secretReveal 3s ease 2s forwards;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .secret-zone:hover {
            background: var(--glow);
            transform: scale(1.2);
            box-shadow: 0 0 20px var(--accent);
        }

        .secret-zone.top-left { top: 10%; left: 10%; }
        .secret-zone.top-right { top: 10%; right: 10%; }
        .secret-zone.bottom-left { bottom: 10%; left: 10%; }
        .secret-zone.bottom-right { bottom: 10%; right: 10%; }

        /* Mysterious Animations */
        @keyframes mysteriousRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes mysteriousShimmer {
            0%, 100% { opacity: 0.3; transform: translateX(-100%); }
            50% { opacity: 0.6; transform: translateX(100%); }
        }

        @keyframes mysteriousReveal {
            0% { 
                opacity: 0; 
                transform: translateY(50px) scale(0.9); 
                filter: blur(10px);
            }
            50% { 
                opacity: 0.7; 
                transform: translateY(25px) scale(0.95); 
                filter: blur(5px);
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
                filter: blur(0);
            }
        }

        @keyframes mysteryPulse {
            0%, 100% { 
                opacity: 0.3; 
                transform: scale(1); 
            }
            50% { 
                opacity: 0.8; 
                transform: scale(1.5); 
            }
        }

        @keyframes secretReveal {
            0% { 
                opacity: 0; 
                transform: scale(0.5); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        /* Mysterious Glitch Effect */
        .glitch-effect {
            position: relative;
            animation: glitch 2s infinite;
        }

        .glitch-effect::before,
        .glitch-effect::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-effect::before {
            animation: glitch-1 0.5s infinite;
            color: #ff0000;
            z-index: -1;
        }

        .glitch-effect::after {
            animation: glitch-2 0.5s infinite;
            color: #00ff00;
            z-index: -2;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        @keyframes glitch-1 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(2px, -2px); }
            40% { transform: translate(-2px, 2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        @keyframes glitch-2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, -2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(-2px, 2px); }
        }

        /* Floating Back Icon */
        .back-icon {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid var(--accent);
            border-radius: 50%;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 18px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
        }

        .back-icon:hover {
            background: var(--glow);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px var(--glow);
            opacity: 1;
        }

        .back-icon i {
            transition: transform 0.3s ease;
        }

        .back-icon:hover i {
            transform: translateX(-2px);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #533483 100%);
            z-index: -2;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><defs><radialGradient id="a" cx="50%" cy="50%"><stop offset="0%" stop-color="%2300d4ff" stop-opacity="0.3"/><stop offset="100%" stop-color="%2300d4ff" stop-opacity="0"/></radialGradient></defs><circle cx="200" cy="200" r="100" fill="url(%23a)"/><circle cx="800" cy="300" r="150" fill="url(%23a)"/><circle cx="400" cy="700" r="120" fill="url(%23a)"/><circle cx="900" cy="800" r="80" fill="url(%23a)"/></svg>');
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 1;
            max-width: 1000px;
            padding: 0 40px;
            position: relative;
        }

        /* Signature Name */
        .signature-name {
            font-family: 'Inter', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 15px;
            color: var(--text);
            position: relative;
            display: inline-block;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .signature-name:hover {
            color: var(--accent);
            transform: translateY(-2px);
        }


        /* Professional Title */
        .professional-title {
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .title-highlight {
            color: var(--accent);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .title-highlight:hover {
            text-decoration: underline;
            cursor: pointer;
        }

        .professional-title a .title-highlight:hover {
            opacity: 0.8;
        }

        /* Tagline */
        .tagline {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 300;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.3;
            font-style: italic;
            position: relative;
        }

        .tagline::before,
        .tagline::after {
            content: '"';
            font-size: 2em;
            color: var(--accent);
            opacity: 0.7;
        }

        /* Avatar Section */
        .avatar-section {
            margin-bottom: 35px;
            position: relative;
        }

        .avatar-container {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            position: relative;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            padding: 4px;
            animation: pulse 3s ease-in-out infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .avatar-icon {
            font-size: 40px;
            color: var(--accent);
            animation: floatIcon 4s ease-in-out infinite;
        }

        .avatar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, var(--glass), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* CTA Button */
        .cta-section {
            margin-top: 30px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: var(--accent);
            color: var(--primary);
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid var(--accent);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .cta-button:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--glow);
        }

        .cta-icon {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .cta-button:hover .cta-icon {
            transform: translateX(5px);
        }

        /* Floating Elements */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-element {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--glass);
            border: 1px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: floatElement 6s ease-in-out infinite;
        }

        .floating-element i {
            font-size: 20px;
            color: var(--accent);
        }

        .floating-element:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
        .floating-element:nth-child(2) { top: 60%; left: 85%; animation-delay: 2s; }
        .floating-element:nth-child(3) { top: 80%; left: 15%; animation-delay: 4s; }
        .floating-element:nth-child(4) { top: 30%; left: 90%; animation-delay: 1s; }
        .floating-element:nth-child(5) { top: 70%; left: 5%; animation-delay: 3s; }

        @keyframes floatElement {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
                flex-direction: column;
                align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            animation: bounce 2s infinite;
        }

        .scroll-arrow {
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, var(--accent), transparent);
            position: relative;
        }

        .scroll-arrow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -3px;
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--accent);
            border-bottom: 2px solid var(--accent);
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .back-icon {
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .hero-content {
                padding: 0 20px;
            }

            .avatar-container {
                width: 120px;
                height: 120px;
            }

            .avatar-icon {
                font-size: 50px;
            }

            .cta-button {
                padding: 12px 25px;
                font-size: 0.9rem;
            }

            .floating-element {
                width: 35px;
                height: 35px;
            }

            .floating-element i {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .avatar-container {
                width: 100px;
                height: 100px;
            }

            .avatar-icon {
                font-size: 40px;
            }

            .cta-button {
                padding: 10px 20px;
                font-size: 0.85rem;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Subtle Particles Effect -->
    <div class="subtle-particles" id="subtle-particles"></div>
    
    
    <!-- Mystery Clues -->
    <div class="mystery-clues">
        <div class="mystery-clue"></div>
        <div class="mystery-clue"></div>
        <div class="mystery-clue"></div>
        <div class="mystery-clue"></div>
        <div class="mystery-clue"></div>
        <div class="mystery-clue"></div>
                </div>

    <!-- Secret Interaction Zones -->
    <div class="secret-zone top-left" data-target="digital-identity.html">
        <i class="fas fa-sitemap"></i>
    </div>
    <div class="secret-zone top-right" data-target="system-architecture.html">
        <i class="fas fa-shield-alt"></i>
    </div>
    <div class="secret-zone bottom-left" data-target="system-core.html">
        <i class="fas fa-server"></i>
    </div>
    <div class="secret-zone bottom-right" data-target="network-vision.html">
        <i class="fas fa-code"></i>
    </div>

    <!-- Main Content -->
    <div class="main-content">
    <!-- Hero Section -->
        <section class="hero-section">
        <div class="hero-content">
                <!-- Signature Name -->
                <h1 class="signature-name">Annaelle Mpassi NG</h1>
            
            <!-- Professional Title -->
            <p class="professional-title">
                <span class="title-highlight">Étudiante en BTS SIO SISR</span> | 
                <span class="title-highlight">Architecte de systèmes informatiques</span> |
            </p>
            
            <!-- Tagline -->
            <p class="tagline">Concevoir, sécuriser et optimiser les infrastructures numériques</p>
            
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-container">
                    <div class="avatar">
                        <i class="fas fa-user avatar-icon"></i>
                    </div>
                    </div>
                </div>

            <!-- CTA Button -->
            <div class="cta-section">
                <a href="Explorer l'architecture.html" class="cta-button">
                    <span>Explorer l'architecture</span>
                    <i class="fas fa-arrow-right cta-icon"></i>
                    </a>
                </div>
            </div>
        </section>
                </div>

    <script>
        // Subtle Particles Effect
        function createSubtleParticles() {
            const container = document.getElementById('subtle-particles');
            const particleCount = 8;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'subtle-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }



        // Easter Egg: Konami Code
        let konamiCode = [];
        const konamiSequence = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65]; // ↑↑↓↓←→←→BA

        document.addEventListener('keydown', (e) => {
            konamiCode.push(e.keyCode);
            if (konamiCode.length > konamiSequence.length) {
                konamiCode.shift();
            }
            
            if (konamiCode.join(',') === konamiSequence.join(',')) {
                activateHackerMode();
                konamiCode = [];
            }
        });

        function activateHackerMode() {
            document.body.style.filter = 'hue-rotate(180deg)';
            document.body.style.animation = 'glitch 0.5s infinite';
            
            // Add terminal-like overlay
            const terminal = document.createElement('div');
            terminal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.9);
                color: #00ff00;
                font-family: 'Courier New', monospace;
                z-index: 10000;
                padding: 20px;
                overflow: auto;
            `;
            terminal.innerHTML = `
                <div style="font-size: 14px; line-height: 1.4;">
                    <div>SYSTEM ACCESS GRANTED</div>
                    <div>User: annaelle.mpassi</div>
                    <div>Role: Future System Administrator</div>
                    <div>Status: BTS SIO SISR Student</div>
                    <div>Skills: Network, Security, Virtualization</div>
                    <div>Target: Cybersecurity Expert</div>
                    <div>----------------------------------------</div>
                    <div>Welcome to the Matrix, Annaelle...</div>
                    <div>Press ESC to exit hacker mode</div>
                </div>
            `;
            document.body.appendChild(terminal);
            
            // Exit on ESC
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    document.body.style.filter = '';
                    document.body.style.animation = '';
                    terminal.remove();
                    document.removeEventListener('keydown', escHandler);
                }
            });
        }

        // Secret Zone Functionality
        function initSecretZones() {
            const secretZones = document.querySelectorAll('.secret-zone');
            
            secretZones.forEach(zone => {
                zone.addEventListener('click', () => {
                    const target = zone.getAttribute('data-target');
                    if (target) {
                        // Add mysterious transition effect
                        document.body.style.opacity = '0';
                        document.body.style.transform = 'scale(0.9)';
                        document.body.style.filter = 'blur(10px)';
                        
                        setTimeout(() => {
                            window.location.href = target;
                        }, 500);
                    }
                });

                // Add mysterious hover effect
                zone.addEventListener('mouseenter', () => {
                    zone.style.background = 'var(--glow)';
                    zone.style.boxShadow = '0 0 30px var(--accent)';
                });

                zone.addEventListener('mouseleave', () => {
                    zone.style.background = 'var(--glass)';
                    zone.style.boxShadow = 'none';
                });
            });
        }

        // Mystery Clue Interaction
        function initMysteryClues() {
            const clues = document.querySelectorAll('.mystery-clue');
            
            clues.forEach((clue, index) => {
                clue.addEventListener('click', () => {
                    // Create mysterious ripple effect
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.borderRadius = '50%';
                    ripple.style.background = 'var(--glow)';
                    ripple.style.transform = 'scale(0)';
                    ripple.style.animation = 'ripple 0.6s linear';
                    ripple.style.left = '50%';
                    ripple.style.top = '50%';
                    ripple.style.width = '20px';
                    ripple.style.height = '20px';
                    ripple.style.marginLeft = '-10px';
                    ripple.style.marginTop = '-10px';
                    
                    clue.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });
            });
        }

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize all effects
        document.addEventListener('DOMContentLoaded', () => {
            createSubtleParticles();
            initSecretZones();
            initMysteryClues();
        });

        // Parallax effect for floating elements
        window.addEventListener('scroll', function() {
            const scrolled = window.pageYOffset;
            const parallax = document.querySelectorAll('.floating-element');
            const speed = 0.5;

            parallax.forEach(function(element) {
                const yPos = -(scrolled * speed);
                element.style.transform = `translateY(${yPos}px)`;
            });
        });
    </script>
</body>
</html>
